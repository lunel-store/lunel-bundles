<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        .card {
            border: 2px solid #e5e7eb;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            background: #fff;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 450px;
        }

        .card.selected {
            border: 2px solid #111;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
            background: #f8f4f4;;
        }

        .top-badge-container {
            position: absolute;
            top: -10px;
            left: 40%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            z-index: 10;
            gap: 4px;
            flex-wrap: nowrap;
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
        }

        .top-badge {
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            background: #26b33d;
            padding: 3px 12px;
            border-radius: 15px;
            white-space: nowrap;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
            font-size: 14px;
            line-height: 1.1;
        }

        /* Seal + flame disks (same as style.css / bundles.js) */
        .top-badge .badge,
        .top-badge .lunel-bundles__top_badge_flame {
            --lunel-scallop-mask: url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Cpath%20fill%3D%22white%22%20d%3D%22M50.00%2C6.00%20C61.50%2C6.00%2050.81%2C10.31%2061.74%2C13.86%20C72.68%2C17.41%2066.56%2C7.64%2075.86%2C14.40%20C85.17%2C21.16%2073.98%2C18.36%2080.74%2C27.66%20C87.50%2C36.97%2088.29%2C25.47%2091.85%2C36.40%20C95.40%2C47.34%2088.00%2C38.50%2088.00%2C50.00%20C88.00%2C61.50%2095.40%2C52.66%2091.85%2C63.60%20C88.29%2C74.53%2087.50%2C63.03%2080.74%2C72.34%20C73.98%2C81.64%2085.17%2C78.84%2075.86%2C85.60%20C66.56%2C92.36%2072.68%2C82.59%2061.74%2C86.14%20C50.81%2C89.69%2061.50%2C94.00%2050.00%2C94.00%20C38.50%2C94.00%2049.19%2C89.69%2038.26%2C86.14%20C27.32%2C82.59%2033.44%2C92.36%2024.14%2C85.60%20C14.83%2C78.84%2026.02%2C81.64%2019.26%2C72.34%20C12.50%2C63.03%2011.71%2C74.53%208.15%2C63.60%20C4.60%2C52.66%2012.00%2C61.50%2012.00%2C50.00%20C12.00%2C38.50%204.60%2C47.34%208.15%2C36.40%20C11.71%2C25.47%2012.50%2C36.97%2019.26%2C27.66%20C26.02%2C18.36%2014.83%2C21.16%2024.14%2C14.40%20C33.44%2C7.64%2027.32%2C17.41%2038.26%2C13.86%20C49.19%2C10.31%2038.50%2C6.00%2050.00%2C6.00%20Z%22%2F%3E%3C%2Fsvg%3E');
            flex-shrink: 0;
            display: grid;
            place-items: center;
            width: 24px;
            height: 24px;
            padding: 0;
            margin: 0;
            border-radius: 0;
            background-color: #fff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
            line-height: 1;
            -webkit-mask-image: var(--lunel-scallop-mask);
            mask-image: var(--lunel-scallop-mask);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        .top-badge .lunel-bundles__top_badge_flame {
            font-size: 11px;
        }

        .top-badge .lunel-bundles__badge-num {
            position: relative;
            z-index: 1;
            font-size: 8.5px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .top-badge.orange .badge,
        .top-badge.orange .lunel-bundles__badge-num {
            color: #ff4d24;
        }

        .top-badge.green .badge,
        .top-badge.green .lunel-bundles__badge-num {
            color: #26b33d;
        }

        .top-badge.orange {
            background: #ff4d24;
        }

        .top-badge.green {
            background: #26b33d;
        }

        .product-details-container {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .product-details-container img {
            width: 100px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #eaeaea;
            background-color: #f9f9f9;
            margin-left: 15px;
        }

        .product-details-container .product-description {
            display: flex;
            flex-direction: column;
            text-align: right;
            padding: 0 5px;
            margin-top: 10px;
        }

        .product-details-container .product-description .title {
            font-size: 15px;
            color: #333;
        }

        .product-details-container .product-description .subtitle {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            line-height: 1.6;
        }

        .discount-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            direction: ltr;
            min-width: 70px;
        }

        .discount-text {
            font-size: 14px;
            background: #ffeb3b;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
            white-space: nowrap;
            color: #ff4d24;
        }
    </style>
</head>

<body>
    <div style="padding: 20px;">
        <div class="card selected">
            <div class="top-badge-container">
                <span class="top-badge green">
                    <span class="badge" aria-hidden="true"><span class="lunel-bundles__badge-num">#1</span></span>
                    seal location
                </span>
                <span class="top-badge orange">
                    <span class="lunel-bundles__top_badge_flame" aria-hidden="true">&#x1F525;</span>
                    flame location
                </span>
            </div>
            <div class="product-details-container">
                <img src="https://cdn.jsdelivr.net/gh/lunel-store/salla-lunel-bundles@v7.0.8/images/p1904366049.webp"
                    alt="product_title">
                <div class="product-description">
                    <strong class="title">Product Title</strong>
                    <div class="subtitle">
                        <span>Subtitle</span>
                    </div>
                </div>
            </div>
            <div class="discount-container">
                <span class="discount-text">Disount 30%</span>
            </div>
        </div>
        <div class="card">
            <div class="top-badge-container">
                <span class="top-badge green">
                    <span class="badge" aria-hidden="true"><span class="lunel-bundles__badge-num">#1</span></span>
                    seal location
                </span>
                <span class="top-badge orange">
                    <span class="lunel-bundles__top_badge_flame" aria-hidden="true">&#x1F525;</span>
                    flame location
                </span>
            </div>
            <div class="product-details-container">
                <img src="https://cdn.jsdelivr.net/gh/lunel-store/salla-lunel-bundles@v7.0.8/images/p1904366049.webp"
                    alt="product_title">
                <div class="product-description">
                    <strong class="title">Product Title</strong>
                    <div class="subtitle">
                        <span>Subtitle</span>
                    </div>
                </div>
            </div>
            <div class="discount-container">
                <span class="discount-text">Disount 30%</span>
            </div>
        </div>
    </div>
</body>

</html>
